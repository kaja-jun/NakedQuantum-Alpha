<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NakedQuantum">
<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NakedQuantum Beta</title>

<!-- Link to your new CSS file -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<canvas id="firefly-canvas"></canvas>

<!-- HEADER -->
<div class="nq-header">
  <div class="nq-wordmark" id="nq-wordmark">NakedQuantum</div>
  <div class="header-actions" id="header-actions"></div>
</div>

<div class="view-host">
  <!-- THE SOUP -->
  <div class="view-panel soup-view" id="view-soup">
    <div id="soup-breadcrumbs" class="breadcrumbs"></div>
    <div id="soup-content" class="soup-surface"></div>
  </div>

  <!-- THE VOID (Soft Delete) -->
  <div class="view-panel soup-view hidden" id="view-void">
    <div class="void-header">
      <div class="void-title">◌ The Void</div>
      <button class="btn-void-purge-all" id="btn-purge-all">Purge All</button>
    </div>
    <div style="padding:0 16px;">
      <button class="modal-btn secondary" id="btn-close-void" style="width:100%; margin-bottom:16px;">← Return to Soup</button>
    </div>
    <div class="soup-surface" id="void-surface" style="padding-top:0;"></div>
  </div>

  <!-- THE SANCTUARY (Phase 2 placeholder) -->
  <div class="view-panel sanctuary-view hidden" id="view-sanctuary">
    <div class="placeholder-center">
      <h1>The Sanctuary</h1>
      <p>The encounter space.<br>Container logic arriving in Phase 2.</p>
    </div>
  </div>
</div>

<!-- FAB -->
<div class="fab-container" id="fab-container">
  <div class="fab-menu" id="fab-menu">
    <div class="fab-item" id="btn-fab-spark" style="color:#a0d8a0;">⚡ New Spark</div>
    <div class="fab-item" id="btn-fab-folder">◈ New Folder</div>
    <div class="fab-item" id="btn-fab-frag" style="color:var(--text);">✦ New Fragment</div>
  </div>
  <button class="fab-main" id="fab-main">＋</button>
</div>

<!-- LIGHTHOUSE EDITOR -->
<div class="lighthouse-overlay" id="lh-overlay">
  <div class="lh-nav">
    <button class="btn-back" id="btn-lh-back">← Soup</button>
    <div class="lh-tools">
        <button class="lh-toggle-btn active" id="btn-lh-write">Write</button>
        <button class="lh-toggle-btn" id="btn-lh-view">View</button>
    </div>
  </div>
  <div class="lh-scroll">
    <div class="lh-inner">
      <input class="lh-title" id="lh-title" placeholder="Untitled Fragment" spellcheck="false">
      
      <!-- Formatting Toolbar -->
      <div class="format-toolbar">
        <button class="fmt-btn" data-wrap="**"><b>B</b></button>
        <button class="fmt-btn" data-wrap="*"><i>I</i></button>
        <button class="fmt-btn" data-wrap="<u>"><u>U</u></button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-line="# ">H1</button>
        <button class="fmt-btn" data-line="## ">H2</button>
        <button class="fmt-btn" data-line="### ">H3</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-line="- ">•</button>
        <button class="fmt-btn" data-line="1. ">1.</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-wrap="> ">"</button>
        <button class="fmt-btn" data-wrap="`">`c`</button>
        <button class="fmt-btn" data-block="```\n" data-end="\n```">```</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-insert="\n---\n">—</button>
      </div>

      <textarea class="content-textarea" id="lh-text" placeholder="Strike into the void..."></textarea>
      <div class="content-view" id="lh-view"></div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="overlay" id="nq-overlay"></div>

<!-- Spark Capture Modal -->
<div class="modal" id="modal-spark">
  <div class="modal-title" style="color:#a0d8a0;">⚡ Quick Spark</div>
  <input type="text" id="spark-title" placeholder="Title..." maxlength="120">
  <textarea id="spark-body" placeholder="Fleeting thought..." style="min-height:120px; resize:none;"></textarea>
  <select id="spark-folder"></select>
  <input type="text" id="spark-new-folder-input" placeholder="New folder name..." style="display:none;">
  <div class="modal-btns">
    <button class="modal-btn secondary" onclick="closeModals()">Cancel</button>
    <button class="modal-btn primary" id="btn-confirm-spark" style="background:#a0d8a0;">Capture</button>
  </div>
</div>

<!-- Folder Modal -->
<div class="modal" id="modal-folder">
  <div class="modal-title">New Folder</div>
  <input type="text" id="input-folder-name" placeholder="Name the void...">
  <div class="modal-btns">
    <button class="modal-btn secondary" onclick="closeModals()">Cancel</button>
    <button class="modal-btn primary" id="btn-confirm-folder">Create</button>
  </div>
</div>

<!-- Management Modal -->
<div class="modal" id="modal-mgmt">
  <div class="modal-title">Manage</div>
  <div style="display:flex; flex-direction:column; gap:10px;">
    <button class="modal-btn secondary" id="btn-mgmt-rename">✎ Rename</button>
    <button class="modal-btn secondary" id="btn-mgmt-move">▤ Move</button>
    <button class="modal-btn danger" id="btn-mgmt-delete">✕ Void (Soft Delete)</button>
  </div>
</div>

<!-- Rename Modal -->
<div class="modal" id="modal-rename">
  <div class="modal-title">Rename</div>
  <input type="text" id="input-rename" placeholder="New name...">
  <div class="modal-btns">
    <button class="modal-btn secondary" onclick="closeModals()">Cancel</button>
    <button class="modal-btn primary" id="btn-confirm-rename">Save</button>
  </div>
</div>

<!-- Move Modal -->
<div class="modal" id="modal-move">
  <div class="modal-title">Move to Folder</div>
  <select id="move-parent-select"><option value="">Root</option></select>
  <div class="modal-btns">
    <button class="modal-btn secondary" onclick="closeModals()">Cancel</button>
    <button class="modal-btn primary" id="btn-confirm-move">Move</button>
  </div>
</div>

<!-- Search Modal -->
<div class="modal" id="modal-search">
  <div class="modal-title">Search All</div>
  <input type="text" id="input-search" placeholder="Search the archive...">
  <div class="global-search-results" id="search-results"></div>
  <div class="modal-btns">
    <button class="modal-btn secondary" onclick="closeModals()">Close</button>
  </div>
</div>

<div id="nq-toast"></div>
<div id="mode-toast"></div>

<!-- Link to your new JavaScript file -->
<script src="app.js"></script>

</body>
</html>
